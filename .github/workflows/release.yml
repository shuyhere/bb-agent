name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo and npm versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          NPM_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG cargo=$CARGO_VERSION npm=$NPM_VERSION"
          test "$TAG" = "$CARGO_VERSION"
          test "$TAG" = "$NPM_VERSION"

      - name: Create release if missing
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create_release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: bb-x86_64-unknown-linux-gnu
            binary: bb
          - os: macos-14
            target: x86_64-apple-darwin
            asset: bb-x86_64-apple-darwin
            binary: bb
          - os: macos-14
            target: aarch64-apple-darwin
            asset: bb-aarch64-apple-darwin
            binary: bb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: bb-x86_64-pc-windows-msvc.exe
            binary: bb.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload to release
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" "${{ matrix.asset }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
